proxy-providers-defaults: &ppd
  type: http
  interval: 86400
  health-check:
    enable: true
    url: "https://www.gstatic.com/generate_204"
    interval: 300
  filter: "^(?!.*(群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author))"
proxy-providers:
  Provider A:
    <<: *ppd
    url: "https://the.url.of/A.yaml"
    override:
      additional-prefix: "[A] "
  Provider B:
    <<: *ppd
    url: "https://the.url.of/B.yaml"
    override:
      additional-prefix: "[B] "
  Provider C:
    <<: *ppd
    url: "https://the.url.of/C.yaml"
    override:
      additional-prefix: "[C] "
mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: true
find-process-mode: strict
profile:
  store-selected: true
  store-fake-ip: true
unified-delay: true
tcp-concurrent: true
global-ua: clash.meta
etag-support: true
dns:
  enable: true
  cache-algorithm: arc
  prefer-h3: false
  use-hosts: true
  use-system-hosts: false
  respect-rules: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range6: fd00::/18
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - rule-set:fake-ip-filter
    - rule-set:direct
    - rule-set:private
    - rule-set:connectivity-check
  default-nameserver:
    - tls://223.5.5.5
    - tls://223.6.6.6
    - tls://119.29.29.29
  proxy-server-nameserver: &a1
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver-policy:
    rule-set:private:
      - system://
    rule-set:direct,geolocation-cn: *a1
  nameserver:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
hosts: {}
sniffer:
  enable: false
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  dns-hijack:
    - any:53
    - tcp://any:53
proxy-groups:
